<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>条文・計算・署名アプリ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: "Yu Gothic", sans-serif;
  margin: 20px;
  background: linear-gradient(to bottom, #eef2f7, #ffffff);
}

h2 {
  text-align: center;
  color: #2c3e50;
}

table {
  border-collapse: collapse;
  width: 60%;
  margin: 20px auto;
  background: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

th, td {
  border: 1px solid #999;
  padding: 8px;
  text-align: center;
}

th {
  background: #f2f2f2;
}

input {
  width: 100px;
}

button {
  margin: 5px;
  padding: 8px 14px;
  border: none;
  background: #3498db;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #2980b9;
}

.center {
  text-align: center;
}

.law-section {
  width: 60%;
  margin: 20px auto;
  background: white;
  padding: 15px;
  border-left: 5px solid #3498db;
}

canvas {
  border: 1px solid #000;
  display: block;
  margin: 10px auto;
  background: #fff;
  touch-action: none;
}

#result {
  font-weight: bold;
  color: #e74c3c;
  font-size: 18px;
}
</style>
</head>

<body>

<h2>差額計算・条文・署名アプリ</h2>

<table>
<tr><th>項目</th><th>数値</th></tr>
<tr><td>銘柄</td><td><input type="number" id="stock"></td></tr>
<tr><td>国債</td><td><input type="number" id="bond"></td></tr>
<tr><td>損失</td><td><input type="number" id="loss"></td></tr>
<tr><td>利益</td><td><input type="number" id="profit"></td></tr>
<tr><th>差額</th><th id="result">0</th></tr>
</table>

<div class="center">
<button onclick="calculate()">計算</button>
<button onclick="resetFields()">リセット</button>
</div>

<div class="law-section">
<h3>条文</h3>
<p>第1条 オプション価格を調整役として使用可能</p>
<p>第2条 政府証券を使用可能</p>
<p>第3条 融資斡旋は禁止</p>
<p>第4条 投資活動としては扱わない</p>
<p>第5条 損益にオプション使用可</p>
</div>

<div class="center">
<h3>署名</h3>
<canvas id="canvas" width="300" height="120"></canvas>

<button onclick="clearSignature()">クリア</button>
<button onclick="saveSignature()">保存</button>

<p id="status"></p>
</div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
